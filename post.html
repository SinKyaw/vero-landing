<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog Post - Vero</title>
  <link rel="icon" href="assets/favicon.ico" type="image/png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@700&family=Inter:wght@400;500&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script src="assets/site.js" defer></script>
  <script src="assets/blog.js" defer></script>
</head>




<body>
  <!-- Background Glow Layers -->
  <div class="bg-glow" aria-hidden="true"></div>

  <!-- Content Layer -->
  <div class="content-layer">

    <!--Navbar-->
    <div data-include="partials/navbar.html"></div>


    <!-- blog content -->
    <main>
      <div class="blog-content">
        <div id="blog-intro" class="solution-content blog-intro">
          <p class="section-label">Our Blog</p>
          <h1 class="section-headline">The latest stories about Vero</h1>
        </div>
        <!-- listing view -->
        <div id="blog-listing" hidden></div>

        <!-- single post view -->
        <div id="post-content" hidden>
          <p class="blog-loading">Loading blog...</p>
        </div>

        <!-- CTA (single post only) -->
        <section id="final-cta" class="section final-cta" hidden>
          <a class="final-cta-btn js-download-choice" href="#download-options">
            Download Vero
            <span class="cta-arrow">→</span>
          </a>
          <br />
        </section>

      </div>
    </main>

    <!--Footer -->
    <div data-include="partials/footer.html"></div>

  </div>

  <div class="download-modal" id="download-options" role="dialog" aria-modal="true" aria-labelledby="download-title"
    aria-hidden="true">
    <div class="download-modal-backdrop" data-download-close></div>
    <div class="download-modal-panel" role="document">
      <button class="download-modal-close" type="button" aria-label="Close download options" data-download-close>
        &times;
      </button>
      <div class="download-modal-copy">
        <p class="section-label" id="download-title">Download Vero</p>
      </div>
      <div class="download-modal-buttons">
        <a href="https://apps.apple.com/th/app/vero/id6759962937" target="_blank" rel="noopener noreferrer">
          <img src="assets/appstore-download.png" alt="Download on the App Store" class="download-modal-badge" />
        </a>
        <a href="https://play.google.com/store/apps/details?id=com.suparat.verofinance" target="_blank"
          rel="noopener noreferrer">
          <img src="assets/google-play-download-cropped.png" alt="Get it on Google Play"
            class="download-modal-badge" />
        </a>
      </div>
    </div>
  </div>


  
</body>

</html>
